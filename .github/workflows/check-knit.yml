name: Check NP_AMR_analysis Rmd knitting

on:
  push:
    paths:
      - "NP_AMR_analysis.Rmd"
      - ".github/workflows/check-knit.yml"
      - "**/*.R"          # optional: rerun when helper scripts change
  pull_request:
    paths:
      - "NP_AMR_analysis.Rmd"
      - ".github/workflows/check-knit.yml"
      - "**/*.R"

jobs:
  knit-rmd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies (if needed)
        run: |
          sudo apt-get update
          # Add any system libs your packages need, e.g.
          # sudo apt-get install -y libxml2-dev libcurl4-openssl-dev libssl-dev

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            rmarkdown
            knitr
            magrittr
            tidyverse
            stringr
            GGally
            archive
            tinytex
            kableExtra
            ggforce

      - name: Render NP_AMR_analysis.Rmd
        run: |
          Rscript -e 'tinytex::install_tinytex(force = TRUE)'
          Rscript -e 'rmarkdown::render("NP_AMR_analysis.Rmd", output_format = "html_document", envir = new.env())'
